<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Feedback</title>
</head>

<body>

<h2>Event Feedback</h2>

<form id="form">

Event Type:
<select id="eventType">
  <option>Conference</option>
  <option>Performance</option>
  <option>Meeting</option>
</select>
<br><br>

Audience Size:
<select id="audienceSize">
  <option>0-50</option>
  <option>50-100</option>
  <option>100+</option>
</select>
<br><br>

Sound System <input type="checkbox" id="sound"><br>
Stage Lighting <input type="checkbox" id="lighting"><br>
Cafe <input type="checkbox" id="cafe"><br>

<br>

Planning Score:
<select id="planning">
  <option value="20">Strongly Disagree</option>
  <option value="40">Disagree</option>
  <option value="60">Neutral</option>
  <option value="80">Agree</option>
  <option value="100">Strongly Agree</option>
</select>

<br><br>

Recommendation (0–10):
<input type="number" id="recommendation">

<br><br>

Comment:
<input type="text" id="comment">

<br><br>

Name:
<input type="text" id="name">

<br><br>

<button type="button" onclick="submitForm()">Submit</button>

</form>

<script>
function submitForm() {

const data = {
  eventName: "Test Event",
  eventDate: "Today",
  organiser: "Test",

  eventType: document.getElementById("eventType").value,
  audienceSize: document.getElementById("audienceSize").value,

  soundSystem: document.getElementById("sound").checked,
  stageLighting: document.getElementById("lighting").checked,
  cafe: document.getElementById("cafe").checked,

  planningScore: document.getElementById("planning").value,

  recommendation: document.getElementById("recommendation").value,
  comment: document.getElementById("comment").value,
  contactName: document.getElementById("name").value
};

fetch("PASTE_YOUR_APPS_SCRIPT_URL_HERE", {
  method: "POST",
  body: JSON.stringify(data)
});

alert("Submitted");

}
</script>

</body>
</html>
